<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantTerminal V10 | Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .terminal-card { background: var(--card); border: 1px solid #1e293b; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .code-font { font-family: 'Fira Code', monospace; }
        .status-indicator { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .btn-analyze { background: var(--accent); color: var(--bg); font-weight: bold; border: none; transition: 0.3s; }
        .btn-analyze:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); background: #7dd3fc; }
        input.form-control { background: #1e293b; border: 1px solid #334155; color: white; border-radius: 10px; }
        input.form-control:focus { background: #1e293b; color: white; border-color: var(--accent); box-shadow: none; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row mb-5">
        <div class="col-12 text-center">
            <h1 class="fw-bold text-info">QUANT TERMINAL <span class="text-white">V10</span></h1>
            <p class="text-muted">Mekatronik Karar Destek & Finansal Projeksiyon Sistemi</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="terminal-card">
                <h5 class="mb-4">Kontrol Ünitesi</h5>
                <div class="mb-3">
                    <label class="form-label text-secondary small fw-bold">HİSSE SEMBOLÜ</label>
                    <input type="text" id="symbol" class="form-control form-control-lg" value="THYAO.IS">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary small fw-bold">TAHMİN PENCERESİ (GÜN)</label>
                    <select id="days" class="form-select bg-dark text-white border-secondary">
                        <option value="1">1 Gün Sonra</option>
                        <option value="2">2 Gün Sonra</option>
                        <option value="5">5 Gün Sonra</option>
                    </select>
                </div>
                <button onclick="runSystem()" class="btn btn-analyze w-100 py-3">ANALİZİ TETİKLE</button>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="terminal-card h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">Sistem Çıktısı</h5>
                    <div id="connectionStatus"><span class="status-indicator bg-success"></span><small class="text-success">Online</small></div>
                </div>
                <hr class="border-secondary">
                <div id="output" class="code-font small" style="min-height: 200px; color: #94a3b8;">
                    > Sistem analiz emri bekliyor... <br>
                    > Veri akışı hazır.
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="mt-4" style="height: 300px;">
    <canvas id="priceChart"></canvas>
</div>

<script>
    let myChart; // Grafik nesnesini global tanımlıyoruz

    async function runSystem() {
        const symbol = document.getElementById('symbol').value;
        const days = document.getElementById('days').value;
        const output = document.getElementById('output');

        try {
            const response = await fetch(`/api/analyze?symbol=${symbol}&days=${days}`);
            const data = await response.json();

            if (data.status === "success") {
                // ... (Önceki metin çıktıları burada kalacak) ...
                
                // GRAFİK ÇİZİMİ
                const ctx = document.getElementById('priceChart').getContext('2d');
                if (myChart) myChart.destroy(); // Eski grafiği sil

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.chart_labels, // Backend'den gelecek tarih listesi
                        datasets: [{
                            label: `${symbol} Fiyat Grafiği`,
                            data: data.chart_prices, // Backend'den gelecek fiyat listesi
                            borderColor: '#38bdf8',
                            borderWidth: 2,
                            fill: true,
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#64748b' } },
                            y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }
                        }
                    }
                });
            }
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
